name: virtual_companion_app
description: AI虚拟陪伴助手 - 专为老年人与心理健康用户设计
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 录音
  record: ^5.1.0

  # 音频播放
  just_audio: ^0.9.40
  audio_waveforms: ^1.0.5

  # 图片选择
  image_picker: ^1.1.2

  # 网络请求
  dio: ^5.4.3
  http: ^1.2.1

  # 本地存储 (记忆系统)
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # 本地通知 (提醒功能)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # 权限
  permission_handler: ^11.3.1

  # 路径
  path_provider: ^2.1.3
  path: ^1.9.0

  # Lottie 动画 (虚拟人表情)
  lottie: ^3.1.2

  # WebSocket (实时流式对话)
  web_socket_channel: ^2.4.5

  # 加密存储 (API Keys)
  flutter_secure_storage: ^9.2.2

  # UUID
  uuid: ^4.4.2

  # 时间格式化
  intl: ^0.19.0

  # 加载动画
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/audio/
